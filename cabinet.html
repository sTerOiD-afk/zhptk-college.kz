<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — ЖВПТК 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .cabinet-container {
            max-width: 900px;
            margin: 120px auto 50px;
            padding: 0 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .profile-avatar {
            width: 120px; 
            height: 120px; 
            font-size: 3.5rem;
            box-shadow: 0 10px 30px rgba(0, 122, 255, 0.3);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .info-card:hover {
            border-color: var(--primary);
            background: rgba(0, 122, 255, 0.05);
            transform: translateY(-5px);
        }
        .info-label { color: #94a3b8; font-size: 0.9rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .info-value { color: white; font-size: 1.2rem; font-weight: bold;}
    </style>
</head>
<body>
    <div class="cyber-bg"><div class="aurora"></div></div>
    
    <nav>
        <a href="index.html" class="nav-link" style="color: var(--accent);"><i class="fas fa-arrow-left"></i> Вернуться на портал</a>
    </nav>

    <div class="cabinet-container">
        <h2 class="section-title" style="text-align: left; margin-bottom: 30px;">Профиль студента</h2>
        <div class="dashboard-card">
            
            <div class="profile-header">
                <div class="user-avatar profile-avatar"><i class="fas fa-user-graduate"></i></div>
                <div class="user-info" style="margin: 0;">
                    <h3 id="cabName">Загрузка данных...</h3>
                    <p id="cabEmail">...</p>
                    <div style="margin-top: 15px; display: inline-block; padding: 6px 18px; background: rgba(16, 185, 129, 0.15); color: #10b981; border-radius: 20px; font-size: 0.9rem; font-weight: bold; border: 1px solid rgba(16, 185, 129, 0.3);">
                        <i class="fas fa-check-circle"></i> Статус: <span id="cabStatus">Активный студент</span>
                    </div>
                </div>
            </div>

            <h3 style="margin-bottom: 25px; color: var(--accent); font-family: 'Space Grotesk';">Учебная информация</h3>
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-laptop-code"></i> Специальность</div>
                    <div class="info-value" id="cabSpec">06130100 Программное обеспечение</div>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-users"></i> Группа</div>
                    <div class="info-value" id="cabGroup">ПО-23-1</div>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-layer-group"></i> Курс</div>
                    <div class="info-value" id="cabCourse">2 курс</div>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-clock"></i> Форма обучения</div>
                    <div class="info-value" id="cabForm">Очная (Бюджет)</div>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-id-card"></i> Номер студ. билета</div>
                    <div class="info-value" id="cabID">№ 2026-4892</div>
                </div>
                <div class="info-card">
                    <div class="info-label"><i class="fas fa-star"></i> Средний балл (GPA)</div>
                    <div class="info-value" id="cabGPA">3.8 / 4.0</div>
                </div>
            </div>

            <div style="margin-top: 50px; display: flex; justify-content: flex-end;">
                <button class="btn-danger" onclick="logoutCab()"><i class="fas fa-sign-out-alt"></i> Завершить сеанс</button>
            </div>
        </div>
    </div>

    <script type="module" src="cabinet.js"></script>
</body>
</html>
