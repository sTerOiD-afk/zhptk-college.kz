<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Личный кабинет — Редактирование профиля</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #020617;
    color: white;
    margin: 0;
}

.container {
    max-width: 720px;
    margin: 80px auto;
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
}

h1 {
    color: #00f2fe;
    margin-top: 0;
}

.field {
    margin-top: 20px;
}

label {
    display: block;
    color: #00f2fe;
    font-weight: bold;
    margin-bottom: 6px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: white;
    font-size: 16px;
}

.buttons {
    margin-top: 30px;
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

.btn-save {
    background: linear-gradient(135deg, #00f2fe, #007aff);
    color: black;
}

.btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
}

.btn-edit {
    background: rgba(0, 122, 255, 0.2);
    color: #007aff;
    border: 1px solid #007aff;
}

.btn-edit:hover {
    background: #007aff;
    color: white;
}

.btn-logout {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
    border: 1px solid #ef4444;
}

.btn-logout:hover {
    background: #ef4444;
    color: white;
}

.status {
    margin-top: 15px;
    padding: 8px 16px;
    background: rgba(16, 185, 129, 0.2);
    color: #10b981;
    border-radius: 20px;
    display: inline-block;
}

</style>
</head>

<body>

<div class="container">

<h1>Личный кабинет</h1>

<div class="status">Статус: Студент</div>

<div class="field">
<label>ФИО</label>
<input id="name" disabled>
</div>

<div class="field">
<label>Email</label>
<input id="email" disabled>
</div>

<div class="field">
<label>Группа</label>
<input id="group" disabled>
</div>

<div class="field">
<label>Специальность</label>
<input id="spec" disabled>
</div>

<div class="buttons">
<button class="btn btn-edit" onclick="enableEdit()">
Редактировать
</button>

<button class="btn btn-save" onclick="saveProfile()">
Сохранить изменения
</button>

<button class="btn btn-logout" onclick="logoutUser()">
Выйти из аккаунта
</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyAMaUx0GGxmQKuPCSlIBow0V2iFudAZrPc",
authDomain: "zhptk-portal-2026.firebaseapp.com",
projectId: "zhptk-portal-2026",

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUserId = null;

onAuthStateChanged(auth, async (user) => {

if (!user) {

alert("Вы не авторизованы");

window.location.href = "index.html";

return;

}

currentUserId = user.uid;

const snap = await getDoc(
doc(db, "users", user.uid)
);

if (snap.exists()) {

const data = snap.data();

name.value = data.name || "";
email.value = data.email || user.email;
group.value = data.group || "";
spec.value = data.spec || "";

}

});

window.enableEdit = function () {

name.disabled = false;

group.disabled = false;

spec.disabled = false;

};

window.saveProfile = async function () {

try {

await updateDoc(
doc(db, "users", currentUserId),
{
name: name.value,

group: group.value,

spec: spec.value
}
);

alert("Профиль обновлён");

name.disabled = true;

group.disabled = true;

spec.disabled = true;

}

catch (e) {

alert("Ошибка сохранения");

}

};

window.logoutUser = function () {

signOut(auth);

window.location.href = "index.html";

};

</script>

</body>
</html>
