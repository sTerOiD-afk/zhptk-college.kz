<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ЖВПТК 2026 — Портал</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;800&display=swap" rel="stylesheet">

<style>
body{
    font-family: Manrope, sans-serif;
    background:#020617;
    color:white;
    margin:0;
}
nav{
    position:fixed;
    top:0;
    width:100%;
    height:70px;
    background:#020617;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    z-index:1000;
}
nav a{
    color:#94a3b8;
    text-decoration:none;
    font-weight:bold;
}
.auth-btn{
    background:#007aff;
    padding:10px 20px;
    border-radius:20px;
    color:white !important;
}
.container{
    max-width:1100px;
    margin:auto;
    padding-top:120px;
}
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}
.modal-card{
    background:#0f172a;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:400px;
}
.auth-form{
    display:flex;
    flex-direction:column;
    gap:10px;
}
.auth-form input{
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#020617;
    color:white;
}
.auth-form button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00f2fe;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
<a href="#">Главная</a>
<a href="#">Специальности</a>
<a href="#">Контакты</a>
<a href="#" onclick="openAuthModal()" id="navAuthBtn" class="auth-btn">
<i class="fas fa-user"></i> Войти
</a>
</nav>

<div class="container">
<h1>ЖВПТК 2026</h1>
<p>Портал абитуриента</p>

<input id="studentName" placeholder="ФИО" style="padding:10px">
<input id="studentPhone" placeholder="Телефон" style="padding:10px">
<button onclick="addStudent()">Отправить заявку</button>
</div>

<div class="modal" id="authModal" onclick="closeAuthModal()">
<div class="modal-card" onclick="event.stopPropagation()">

<div class="auth-form">
<h3>Вход</h3>
<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPass" placeholder="Пароль">
<button onclick="loginUser()">Войти</button>
<p id="loginErr" style="color:red;display:none"></p>

<hr>

<h3>Регистрация</h3>
<input type="text" id="regName" placeholder="ФИО">
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Пароль">
<button onclick="registerUser()">Создать аккаунт</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAMaUx0GGxmQKuPCSlIBow0V2iFudAZrPc",
authDomain: "zhptk-portal-2026.firebaseapp.com",
projectId: "zhptk-portal-2026",

/* ИСПРАВЛЕНО */
storageBucket: "zhptk-portal-2026.appspot.com",

messagingSenderId: "49450481804",
appId: "1:49450481804:web:557ce5ecf2a2f8c68163a9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

console.log("Firebase подключен");

onAuthStateChanged(auth, (user)=>{
const navBtn = document.getElementById("navAuthBtn");

if(user){
navBtn.innerHTML = "<i class='fas fa-user-circle'></i> Кабинет";
}
else{
navBtn.innerHTML = "<i class='fas fa-user'></i> Войти";
}
});

window.registerUser = async function(){

try{

const name = document.getElementById("regName").value.trim();
const email = document.getElementById("regEmail").value.trim();
const pass = document.getElementById("regPass").value.trim();

if(!name || !email || !pass){
alert("Заполните все поля");
return;
}

if(pass.length < 6){
alert("Пароль минимум 6 символов");
return;
}

const userCredential = await createUserWithEmailAndPassword(auth,email,pass);
const user = userCredential.user;

await setDoc(doc(db,"users",user.uid),{
fio:name,
email:email,
role:"Абитуриент",
createdAt:serverTimestamp()
});

alert("Регистрация успешна");
closeAuthModal();

}
catch(error){

console.error(error);

if(error.code === "auth/email-already-in-use")
alert("Email уже используется");
else if(error.code === "auth/invalid-email")
alert("Неверный email");
else if(error.code === "auth/weak-password")
alert("Слабый пароль");
else
alert("Ошибка регистрации");

}
};

window.loginUser = async function(){

try{

const email = document.getElementById("loginEmail").value;
const pass = document.getElementById("loginPass").value;

await signInWithEmailAndPassword(auth,email,pass);

closeAuthModal();

}
catch(error){

console.error(error);

const err = document.getElementById("loginErr");
err.innerText = "Неверный email или пароль";
err.style.display = "block";

}
};

window.logoutUser = async function(){
await signOut(auth);
alert("Вы вышли из аккаунта");
};

window.addStudent = async function(){

const name = document.getElementById("studentName").value;
const phone = document.getElementById("studentPhone").value;

if(!name || !phone){
alert("Введите данные");
return;
}

await addDoc(collection(db,"applications"),{
name:name,
phone:phone,
createdAt:serverTimestamp()
});

alert("Заявка отправлена");

document.getElementById("studentName").value="";
document.getElementById("studentPhone").value="";

};

window.openAuthModal = function(){
document.getElementById("authModal").style.display="flex";
};

window.closeAuthModal = function(){
document.getElementById("authModal").style.display="none";
};

</script>

</body>
</html>
